app = "roy-crypto-agent"          # ← GANTI dengan nama yang kamu pilih
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["python"]

[env]
  PORT = "8080"
  LLM_PROVIDER = "groq"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
